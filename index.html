<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lista de compras</title>

  <link rel="stylesheet" href="styles/index.css">
</head>
<body>
  <img class="desktop-only" src="assets/images/logo.png" alt="Logo Quicklist">
  <header class="container">
    <img src="assets/icons/link button.svg" alt="">
    <h1>Compras da semana</h1>
  </header>

  <form>
    <div class="add-item container">
      <input type="text" name="items" id="items" placeholder="Adicione um novo item">
      <input type="submit" value="Adicionar item">
    </div>

    <ul class="cards container">
      <li class="card">
        <label for="pao">
          <input type="checkbox" id="pao" name="lista" value="pao-de-forma">
          <span class="checkbox"></span>
          <p>Pão de forma</p>
        </label>
        <img src="assets/icons/lixeira.svg" alt="Icon lixeira">
      </li>

      <li class="card">
        <label for="cafe-preto">
          <input type="checkbox" id="cafe-preto" name="lista" value="cafe-preto">
          <span class="checkbox"></span>
          <p>Café preto</p>
        </label>
        <img src="assets/icons/lixeira.svg" alt="Icon lixeira">
      </li>

      <li class="card">
        <label for="suco-de-laranja">
          <input type="checkbox" id="suco-de-laranja" name="lista" value="suco-de-laranja">
          <span class="checkbox"></span>
          <p>Suco de laranja</p>
        </label>
        <img src="assets/icons/lixeira.svg" alt="Icon lixeira">
      </li>

      <li class="card">
        <label for="bolacha">
          <input type="checkbox" id="bolacha" name="lista" value="bolacha">
          <span class="checkbox"></span>
          <p>Bolacha</p>
        </label>
        <img src="assets/icons/lixeira.svg" alt="Icon lixeira">
      </li>
    </ul>
  </form>

</body>
</html>
